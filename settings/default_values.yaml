configurations:
    devices: ["cpu", "cuda"]
    cpu_threads:
        min: 0
    num_workers:
        min: 1
    languages: ["en", "it", "fr", "de", "es"]
    models: ["tiny.en", "tiny", "base.en", "base", "small.en", "small", "medium.en", "medium", "large-v1", "large-v2", "large-v3", "large", "distil-large-v2", "distil-medium.en", "distil-small.en", "distil-large-v3", "distil-large-v3.5", "large-v3-turbo", "turbo"]
    compute_types: ["auto", "default", "int8", "int8_float32", "int8_float16", "int8_bfloat16", "int16", "float16", "bfloat16", "float32"]
    temperature:
        min: 0.0
    beam_size:
        min: 1
    batch_size:
        min: 1

default_values:
    video_extensions: ['.mp4', '.avi', '.mov', '.mkv', '.webm']
    audio_extensions: ['.mp3', '.wav', '.flac', '.ogg', '.m4a']
    input_file: null

    download_output: null
    max_media_duration_seconds: 14400 # 14400 = 4 hours

gemini:
    models: ["gemini-flash-latest", "gemini-flash-lite-latest"]

    requests_per_minute: 15
    requests_per_day: 1500
    tokens_per_minute: 1048576
    input_tokens: 1048576
    temperature: 1
    top_p: 0.95
    top_k: 40
    max_output_tokens: 8192
    response_mime_type: "text/plain"
    safety_settings:
        harm_category_harassment: 
            name: "HARM_CATEGORY_HARASSMENT"
            threshold: "BLOCK_NONE"
        harm_category_hate_speech: 
            name: "HARM_CATEGORY_HATE_SPEECH"
            threshold: "BLOCK_NONE"
        harm_category_sexually_explicit: 
            name: "HARM_CATEGORY_SEXUALLY_EXPLICIT"
            threshold: "BLOCK_NONE"
        harm_category_dangerous_content:
            name: "HARM_CATEGORY_DANGEROUS_CONTENT"
            threshold: "BLOCK_NONE"
