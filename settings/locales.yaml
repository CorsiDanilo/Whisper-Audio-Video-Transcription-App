italian:
  # General UI
  title: "# 🎤 Trascrizione Audio/Video con Modello Whisper"
  browse: "📁 Sfoglia..."
  quit: "❌ Esci"
  reset_fields: "🔄 Resetta campi"
  tray_show_hide: "👁️ Mostra / Nascondi App"
  tray_exit: "❌ Esci"
  
  # Configurations section
  configurations_title: "## ⚙️ Configurazioni"
  explanation_accordion: "ℹ️ Spiegazione"
  explanation_text: |-
    - **Dispositivo**: Determina il dispositivo da utilizzare per l'elaborazione (CPU o GPU).
    - **Thread CPU**: Determina il numero di thread da utilizzare (valori più alti possono migliorare la velocità ma richiedono più risorse CPU).
    - **Numero di Worker**: Determina il numero di worker (valori più alti possono velocizzare ma richiedono più memoria).
    - **Lingua**: Determina la lingua del file audio.
    - **Dimensione Modello**: Determina il modello Whisper. `turbo` è un'opzione multilingua veloce; i modelli `distil-*` sono più veloci ma utili principalmente per l'inglese.
    - **Condiziona su Testo Precedente**: Se selezionato, il modello considererà il testo precedente durante la trascrizione. Si consiglia di disabilitarlo per i modelli `distil-*`.
    - **Timestamp per parola**: Se selezionato, fornirà timestamp per ogni parola.
    - **Tipo di Calcolo**: Determina la precisione dei calcoli (precisione maggiore = più accurato ma più lento).
    - **Temperatura**: Determina la casualità delle previsioni (valori più alti introducono più errori ma possono migliorare la diversità).
    - **Dimensione Beam**: Determina il numero di percorsi di trascrizione possibili da considerare (valori più alti migliorano l'accuratezza ma richiedono più tempo).
    - **Dimensione Batch**: Determina il numero di file audio da elaborare contemporaneamente (valori più alti migliorano la velocità ma richiedono più memoria).
  config_file_path_label: "Percorso file di configurazione"
  config_file_path_placeholder: "C:\\percorso\\al\\config.yaml"
  device_label: "Dispositivo"
  cpu_threads_label: "Thread CPU"
  num_workers_label: "Numero di Worker"
  language_label: "Lingua"
  whisper_model_label: "Modello Whisper"
  compute_type_label: "Tipo di Calcolo"
  temperature_label: "Temperatura"
  beam_size_label: "Dimensione Beam"
  batch_size_label: "Dimensione Batch"
  condition_on_previous_text_label: "Condiziona su Testo Precedente"
  word_timestamps_label: "Timestamp per parola"
  save_configurations: "💾 Salva configurazioni"
  
  # Media section
  media_file_path_label: "Percorsi file"
  media_file_path_placeholder: "Usa 'Sfoglia...' per selezionare i file oppure incolla i percorsi (uno per riga)"
  
